# MediaMTX config for the sermon studio.
# Run from the project ROOT so the relative cert/recording paths resolve:
#   tools\mediamtx.exe mediamtx\mediamtx.yml

logLevel: info
logDestinations: [stdout]

# Control API (used later by the control service). Bound to localhost only.
api: yes
apiAddress: 127.0.0.1:9997

# We use WebRTC only (WHIP publish from phones + WHEP read for the dashboard).
# Disable the protocols we don't need to shrink the surface area.
rtsp: no
rtmp: no
hls: no
srt: no

# WebRTC. Signalling (WHIP/WHEP HTTP) binds to localhost only — the dev-server /
# control service on :8443 reverse-proxies to it, so phones use ONE TLS origin
# (no CORS, no cross-origin TLS — which iOS Safari blocks). Media still flows
# directly phone<->MediaMTX over the UDP port below (WebRTC encrypts media itself).
webrtc: yes
webrtcAddress: 127.0.0.1:8889
webrtcEncryption: no
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
# Gather all interface IPs as ICE candidates and also advertise the LAN IP.
# This laptop is multi-homed (Ethernet, Tailscale, VPN, Hyper-V); offering every
# candidate lets each phone pick whatever path actually reaches it — ICE runs
# connectivity checks and uses the one that works. The church's single-router
# network won't have this ambiguity; there, pin the router IP and turn this off.
webrtcIPsFromInterfaces: yes
webrtcAdditionalHosts: [192.168.0.52]

pathDefaults:
  # Recording is OFF by default and toggled at runtime by the control service
  # (operator clicks Record). Preview/framing happens without recording the
  # setup fumbling. Copy-only (no re-encode) when on.
  record: no
  recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 2h   # one file per service (sermons run ~45 min)
  recordDeleteAfter: 0s       # never auto-delete (MediaMTX default 1d would erase recordings)

# Camera paths are managed at runtime by the control service (from
# data/cameras.json) via the MediaMTX API — none are pre-declared here.
paths: {}
