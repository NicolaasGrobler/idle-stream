# MediaMTX config for Wireless Multicam Studio.
# Network-agnostic template: dev-up.ps1 renders mediamtx.gen.yml from this
# (injecting the detected LAN IP) and launches MediaMTX from the generated copy,
# always from the project ROOT so the relative cert/recording paths resolve.

logLevel: info
logDestinations: [stdout]

# Control API (used later by the control service). Bound to localhost only.
api: yes
apiAddress: 127.0.0.1:9997

# We use WebRTC only (WHIP publish from phones + WHEP read for the dashboard).
# Disable the protocols we don't need to shrink the surface area.
rtsp: no
rtmp: no
hls: no
srt: no

# WebRTC. Signalling (WHIP/WHEP HTTP) binds to localhost only — the dev-server /
# control service on :8443 reverse-proxies to it, so phones use ONE TLS origin
# (no CORS, no cross-origin TLS — which iOS Safari blocks). Media still flows
# directly phone<->MediaMTX over the UDP port below (WebRTC encrypts media itself).
webrtc: yes
webrtcAddress: 127.0.0.1:8889
webrtcEncryption: no
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
# Gather every interface IP as an ICE candidate — including the LAN IP — so each
# phone picks whatever path actually reaches it (ICE runs connectivity checks and
# uses the one that works). This handles multi-homed machines (Ethernet, Tailscale,
# VPN, Hyper-V) with zero per-network config.
#
# webrtcAdditionalHosts is for addresses NOT bound to a local interface (a public
# IP behind NAT, a DNS name). On a plain LAN it's redundant, so it ships empty.
# dev-up.ps1 injects the detected LAN IP here at startup (into mediamtx.gen.yml)
# as belt-and-suspenders; this committed file stays network-agnostic.
webrtcIPsFromInterfaces: yes
webrtcAdditionalHosts: []

pathDefaults:
  # Recording is OFF by default and toggled at runtime by the control service
  # (operator clicks Record). Preview/framing happens without recording the
  # setup fumbling. Copy-only (no re-encode) when on.
  record: no
  recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 2h   # one long segment per session (covers a full event without splitting)
  recordDeleteAfter: 0s       # never auto-delete (MediaMTX default 1d would erase recordings)

# Camera paths are managed at runtime by the control service (from
# data/cameras.json) via the MediaMTX API — none are pre-declared here.
paths: {}
