<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operator Dashboard</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0a0a0a; color: #e8e8e8;
      font: 14px/1.4 -apple-system, system-ui, Segoe UI, Roboto, sans-serif; }
    body { display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #222; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    .spacer { flex: 1; }
    button { font: inherit; padding: 8px 14px; border-radius: 8px; border: 1px solid #333; background: #161616; color: #e8e8e8; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.go { background: #16a34a; border-color: #16a34a; color: #fff; }
    button.rec { background: #dc2626; border-color: #dc2626; color: #fff; }
    button.stop { background: #2a2a2a; }
    button.sm { padding: 5px 9px; font-size: 12px; }
    .layout { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
    /* Custom dropdown (replaces native <select>) */
    .dd { position: relative; }
    .dd-btn { width: 100%; font: inherit; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 10px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; cursor: pointer; }
    .dd-caret { flex: none; color: #888; transition: transform 0.15s ease; }
    .dd.open .dd-caret { transform: rotate(180deg); }
    .dd.open .dd-btn { border-color: #4ade80; }
    .dd-menu { display: none; position: absolute; z-index: 30; top: calc(100% + 4px); left: 0; min-width: 100%;
      background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 4px; box-shadow: 0 10px 28px rgba(0,0,0,0.55); max-height: 260px; overflow: auto; white-space: nowrap; }
    .dd.open .dd-menu { display: block; }
    .dd-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .dd-item:hover { background: #1d1d1d; }
    .dd-item.sel { color: #4ade80; }
    .dd-item.dis { color: #555; cursor: default; }
    .dd-item.dis:hover { background: transparent; }
    .dd.compact .dd-btn { padding: 6px 9px; font-size: 12px; }
    main { flex: 1; display: flex; min-height: 0; }
    #side { width: 320px; border-right: 1px solid #222; padding: 12px; overflow: auto; }
    #side h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin: 4px 0 10px; display: flex; align-items: center; }
    .card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
    .camrow { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .camrow .cid { font-size: 11px; color: #777; width: 42px; }
    .camrow input { flex: 1; font: inherit; padding: 6px 8px; border-radius: 7px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; }
    .phone .name { font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .phone select { width: 100%; font: inherit; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; }
    .empty { color: #666; font-size: 13px; padding: 6px 0; }
    #grid { flex: 1; display: grid; gap: 10px; padding: 12px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); align-content: start; min-height: 0; overflow: auto; }
    .tile { position: relative; background: #000; border: 1px solid #222; border-radius: 10px; overflow: hidden; aspect-ratio: 16 / 9; }
    .tile video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .tile .label { position: absolute; top: 8px; left: 10px; font-weight: 600; font-size: 13px; padding: 2px 8px; background: rgba(0,0,0,0.55); border-radius: 6px; }
    .tile .state { position: absolute; bottom: 8px; left: 10px; }
    .tile .stats { position: absolute; bottom: 8px; right: 10px; font-size: 11px; color: #aaa; padding: 2px 6px; background: rgba(0,0,0,0.5); border-radius: 6px; }
    .tile .offline-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .ok { background: #052e16; color: #4ade80; }
    .warn { background: #3a2e05; color: #fbbf24; }
    .bad { background: #3b0a0a; color: #f87171; }
    .muted { background: #1a1a1a; color: #888; }
    .recdot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; display: inline-block; }
    /* Modal (replaces native prompt/confirm) */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 18px; width: min(360px, 90vw); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .modal h3 { margin: 0 0 10px; font-size: 16px; }
    .modal-msg { margin: 0 0 14px; color: #bbb; font-size: 14px; }
    .modal-input { width: 100%; font: inherit; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; margin-bottom: 14px; }
    .modal-input:focus { outline: none; border-color: #4ade80; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Operator</h1>
    <span id="conn" class="badge muted">connecting…</span>
    <span id="live" class="badge muted">0 live</span>
    <span id="recstate" class="badge muted">not recording</span>
    <label class="layout">Layout <span id="colsMount"></span></label>
    <div class="spacer"></div>
    <button id="previewAll" class="go">Start Preview (all)</button>
    <button id="stopAll" class="stop">Stop Preview</button>
    <button id="recBtn" class="rec">● Record</button>
    <button id="stopRecBtn" class="stop" disabled>Stop Recording</button>
  </header>

  <main>
    <div id="side">
      <h2>Cameras <span class="spacer"></span><button id="addCam" class="sm">+ Add</button></h2>
      <div id="cameras" class="card"></div>

      <h2>Connected phones</h2>
      <div id="phones"></div>
      <div id="noPhones" class="empty">No phones connected. Open the phone page, enter a name, tap Join.</div>
    </div>
    <div id="grid"></div>
  </main>

  <script>
    let lastState = { cameras: [], phones: [], slots: {}, recording: false, recordingStartedAt: null };
    const $ = (id) => document.getElementById(id);
    const setBadge = (el, cls, text) => { el.textContent = text; el.className = 'badge ' + cls; };
    const escapeHtml = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    // While the operator is mid-interaction in the side panel (dropdown open or
    // typing a camera name), defer side-panel re-renders so we don't wipe it.
    let sidePanelBusy = false;
    function setBusy(b) { sidePanelBusy = b; if (!b) renderControl(); }

    // Themed modal — replaces native prompt()/confirm().
    // With `input`: resolves to the trimmed string or null (cancel).
    // Without: resolves true (confirm) or false (cancel).
    function showModal({ title, message, input, confirmLabel = 'OK', danger = false }) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal">
          <h3>${escapeHtml(title)}</h3>
          ${message ? `<p class="modal-msg">${escapeHtml(message)}</p>` : ''}
          ${input ? `<input class="modal-input" placeholder="${escapeHtml(input.placeholder || '')}" value="${escapeHtml(input.value || '')}" />` : ''}
          <div class="modal-actions">
            <button class="stop modal-cancel">Cancel</button>
            <button class="${danger ? 'rec' : 'go'} modal-ok">${escapeHtml(confirmLabel)}</button>
          </div></div>`;
        document.body.appendChild(overlay);
        const inputEl = overlay.querySelector('.modal-input');
        const done = (val) => { overlay.remove(); document.removeEventListener('keydown', onKey, true); resolve(val); };
        const ok = () => done(input ? (inputEl.value.trim() || null) : true);
        const cancel = () => done(input ? null : false);
        overlay.querySelector('.modal-ok').addEventListener('click', ok);
        overlay.querySelector('.modal-cancel').addEventListener('click', cancel);
        overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) cancel(); });
        function onKey(e) { if (e.key === 'Escape') cancel(); else if (e.key === 'Enter') { e.preventDefault(); ok(); } }
        document.addEventListener('keydown', onKey, true);
        if (inputEl) { inputEl.focus(); inputEl.select(); }
      });
    }

    // Lightweight custom dropdown — no library, matches the theme.
    // opts: [{value, label, disabled}]. Returns { el }.
    function createDropdown({ value, opts, onChange, placeholder, compact, onOpenChange }) {
      const root = document.createElement('div');
      root.className = 'dd' + (compact ? ' compact' : '');
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'dd-btn';
      const menu = document.createElement('div');
      menu.className = 'dd-menu';
      root.append(btn, menu);
      const labelOf = (v) => { const o = opts.find((o) => o.value === v); return o ? o.label : (placeholder || 'Select'); };
      btn.innerHTML = '<span class="dd-label"></span>'
        + '<svg class="dd-caret" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
      btn.querySelector('.dd-label').textContent = labelOf(value);
      for (const o of opts) {
        const item = document.createElement('div');
        item.className = 'dd-item' + (o.value === value ? ' sel' : '') + (o.disabled ? ' dis' : '');
        item.textContent = o.label;
        if (!o.disabled) item.addEventListener('click', () => { close(); onChange(o.value); });
        menu.appendChild(item);
      }
      function open() { root.classList.add('open'); if (onOpenChange) onOpenChange(true); document.addEventListener('pointerdown', outside, true); }
      function close() { root.classList.remove('open'); if (onOpenChange) onOpenChange(false); document.removeEventListener('pointerdown', outside, true); }
      function outside(e) { if (!root.contains(e.target)) close(); }
      btn.addEventListener('click', (e) => { e.stopPropagation(); root.classList.contains('open') ? close() : open(); });
      return { el: root };
    }

    // ---------- Control WebSocket ----------
    let ws = null, wsDelay = 1000;
    function connectWS() {
      ws = new WebSocket(`wss://${location.host}/ws/operator`);
      ws.onopen = () => { wsDelay = 1000; setBadge($('conn'), 'ok', 'connected'); };
      ws.onclose = () => { setBadge($('conn'), 'bad', 'reconnecting…'); setTimeout(connectWS, wsDelay); wsDelay = Math.min(wsDelay * 2, 30000); };
      ws.onmessage = (ev) => { const m = JSON.parse(ev.data); if (m.type === 'state') { lastState = m; renderControl(); syncGrid(); } };
    }
    const send = (obj) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); };

    // ---------- Control panel ----------
    function renderControl() {
      if (sidePanelBusy) return;            // don't wipe an open dropdown / a field being typed in
      const cams = lastState.cameras || [];

      // Camera management
      const cbox = $('cameras');
      cbox.innerHTML = cams.length ? '' : '<div class="empty">No cameras. Add one.</div>';
      for (const c of cams) {
        const row = document.createElement('div');
        row.className = 'camrow';
        row.innerHTML = `<span class="cid">${c.id}</span>
          <input value="${escapeHtml(c.label)}" />
          <button class="sm stop" title="Remove">×</button>`;
        const input = row.querySelector('input');
        const commit = () => { setBusy(false); const v = input.value.trim(); if (v && v !== c.label) send({ type: 'renameCamera', id: c.id, label: v }); };
        input.addEventListener('focus', () => setBusy(true));
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
        row.querySelector('button').addEventListener('click', async () => {
          if (await showModal({ title: 'Remove camera', message: `Remove "${c.label}" (${c.id})?`, confirmLabel: 'Remove', danger: true })) {
            send({ type: 'removeCamera', id: c.id });
          }
        });
        cbox.appendChild(row);
      }

      // Phone roster
      const phones = lastState.phones || [];
      $('noPhones').style.display = phones.length ? 'none' : 'block';
      const host = $('phones');
      host.innerHTML = '';
      const taken = lastState.slots || {};
      for (const p of phones) {
        const div = document.createElement('div');
        div.className = 'card phone';
        div.innerHTML = `<div class="name">${escapeHtml(p.name)}
          <span class="badge ${p.publishing ? 'ok' : 'muted'}">${p.publishing ? 'live' : 'standby'}</span></div>`;
        const opts = [{ value: '', label: 'Unassigned' }].concat(cams.map((c) => {
          const otherOwner = taken[c.id] && taken[c.id] !== p.id;
          return { value: c.id, label: c.label + (otherOwner ? ' (taken)' : ''), disabled: !!otherOwner };
        }));
        const dd = createDropdown({
          value: p.slot || '', opts, placeholder: 'Unassigned',
          onOpenChange: setBusy,
          onChange: (v) => { if (v) send({ type: 'assign', phoneId: p.id, slot: v }); else send({ type: 'unassign', phoneId: p.id }); },
        });
        div.appendChild(dd.el);
        host.appendChild(div);
      }

      const liveCount = phones.filter((p) => p.publishing).length;
      setBadge($('live'), liveCount ? 'ok' : 'muted', `${liveCount} live`);
      if (lastState.recording) {
        $('recstate').innerHTML = `<span class="recdot"></span> REC ${fmtElapsed()}`;
        $('recstate').className = 'badge bad';
        $('recBtn').disabled = true; $('stopRecBtn').disabled = false;
      } else {
        setBadge($('recstate'), 'muted', 'not recording');
        $('recBtn').disabled = liveCount === 0; $('stopRecBtn').disabled = true;
      }
    }
    function fmtElapsed() {
      if (!lastState.recordingStartedAt) return '';
      const s = Math.max(0, Math.floor(Date.now() / 1000 - lastState.recordingStartedAt));
      return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }
    setInterval(() => { if (lastState.recording) renderControl(); }, 1000);

    $('addCam').addEventListener('click', async () => {
      const label = await showModal({ title: 'Add camera', input: { placeholder: 'e.g. Balcony' }, confirmLabel: 'Add' });
      if (label) send({ type: 'addCamera', label });
    });
    $('previewAll').addEventListener('click', () => send({ type: 'startPreview' }));
    $('stopAll').addEventListener('click', () => send({ type: 'stopPreview' }));
    $('recBtn').addEventListener('click', () => send({ type: 'startRecording' }));
    $('stopRecBtn').addEventListener('click', () => send({ type: 'stopRecording' }));

    // ---------- WHEP multiview (dynamic tiles) ----------
    const tiles = {};
    const grid = $('grid');

    // Grid column layout (Auto / fixed N per row), remembered across sessions.
    function applyCols(v) {
      grid.style.gridTemplateColumns = v === 'auto' ? 'repeat(auto-fit, minmax(300px, 1fr))' : `repeat(${v}, 1fr)`;
    }
    let savedCols = localStorage.getItem('gridCols') || 'auto';
    function mountColsDropdown() {
      const dd = createDropdown({
        value: savedCols, compact: true,
        opts: [{ value: 'auto', label: 'Auto' }, { value: '2', label: '2' }, { value: '3', label: '3' }, { value: '4', label: '4' }],
        onChange: (v) => { savedCols = v; localStorage.setItem('gridCols', v); applyCols(v); $('colsMount').innerHTML = ''; mountColsDropdown(); },
      });
      $('colsMount').appendChild(dd.el);
    }
    applyCols(savedCols);
    mountColsDropdown();

    function syncGrid() {
      const cams = lastState.cameras || [];
      const ids = new Set(cams.map((c) => c.id));
      for (const id of Object.keys(tiles)) {            // remove tiles for deleted cameras
        if (!ids.has(id)) { teardown(id); tiles[id].root.remove(); delete tiles[id]; }
      }
      for (const c of cams) {
        if (!tiles[c.id]) {                              // create tile for new camera
          const el = document.createElement('div');
          el.className = 'tile';
          el.innerHTML = `<video autoplay playsinline muted></video><div class="offline-overlay">offline</div>
            <span class="label"></span><span class="state badge muted">offline</span><span class="stats"></span>`;
          grid.appendChild(el);
          tiles[c.id] = { root: el, video: el.querySelector('video'), overlay: el.querySelector('.offline-overlay'),
            state: el.querySelector('.state'), stats: el.querySelector('.stats'), label: el.querySelector('.label'), pc: null, lastBytes: 0, lastTs: 0 };
        }
        tiles[c.id].label.textContent = `${c.label} · ${c.id}`;
      }
    }
    function setTile(id, cls, text, overlay) { const t = tiles[id]; if (!t) return; t.state.className = 'state badge ' + cls; t.state.textContent = text; t.overlay.style.display = overlay ? 'flex' : 'none'; }
    function waitIce(pc) { return new Promise((r) => { if (pc.iceGatheringState === 'complete') return r(); const f = () => { if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', f); r(); } }; pc.addEventListener('icegatheringstatechange', f); setTimeout(r, 2000); }); }

    async function subscribe(id) {
      const t = tiles[id]; if (!t) return;
      setTile(id, 'warn', 'connecting…', true);
      const pc = new RTCPeerConnection({ iceServers: [] });
      t.pc = pc;
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });
      pc.ontrack = (e) => { t.video.srcObject = e.streams[0]; };
      pc.onconnectionstatechange = () => { const s = pc.connectionState; if (s === 'connected') setTile(id, 'ok', 'live', false); else if (s === 'failed' || s === 'disconnected') setTile(id, 'bad', s, false); };
      try {
        await pc.setLocalDescription(await pc.createOffer());
        await waitIce(pc);
        const res = await fetch(`/${id}/whep`, { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: pc.localDescription.sdp });
        if (!res.ok) throw new Error('WHEP ' + res.status);
        await pc.setRemoteDescription({ type: 'answer', sdp: await res.text() });
      } catch (e) { teardown(id); setTile(id, 'muted', 'offline', true); }
    }
    function teardown(id) { const t = tiles[id]; if (!t) return; if (t.pc) { try { t.pc.close(); } catch {} t.pc = null; } t.video.srcObject = null; t.lastBytes = 0; t.lastTs = 0; t.stats.textContent = ''; }
    const isLive = (pc) => pc && ['new', 'connecting', 'connected', 'checking'].includes(pc.connectionState);

    async function pollPaths() {
      let ready = {};
      try { const d = await (await fetch('/paths-status', { cache: 'no-store' })).json(); for (const i of (d.items || [])) ready[i.name] = i.ready; } catch {}
      for (const id of Object.keys(tiles)) {
        if (ready[id] && !isLive(tiles[id].pc)) { teardown(id); subscribe(id); }
        if (!ready[id] && tiles[id].pc) { teardown(id); setTile(id, 'muted', 'offline', true); }
      }
    }
    setInterval(async () => {
      for (const id of Object.keys(tiles)) { const t = tiles[id]; if (!t.pc || t.pc.connectionState !== 'connected') continue;
        (await t.pc.getStats()).forEach((r) => { if (r.type === 'inbound-rtp' && r.kind === 'video') { if (t.lastTs) t.stats.textContent = `${Math.round(((r.bytesReceived - t.lastBytes) * 8) / (r.timestamp - t.lastTs))} kbps`; t.lastBytes = r.bytesReceived; t.lastTs = r.timestamp; } }); }
    }, 1000);

    connectWS();
    renderControl();
    pollPaths();
    setInterval(pollPaths, 2000);
  </script>
</body>
</html>
