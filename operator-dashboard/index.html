<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operator Dashboard</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0a0a0a; color: #e8e8e8;
      font: 14px/1.4 -apple-system, system-ui, Segoe UI, Roboto, sans-serif; }
    body { display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #222; flex-wrap: wrap; }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    .spacer { flex: 1; }
    button { font: inherit; padding: 8px 14px; border-radius: 8px; border: 1px solid #333; background: #161616; color: #e8e8e8; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.go { background: #16a34a; border-color: #16a34a; color: #fff; }
    button.rec { background: #dc2626; border-color: #dc2626; color: #fff; }
    button.stop { background: #2a2a2a; }
    button.sm { padding: 5px 9px; font-size: 12px; }
    .layout { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
    /* Custom dropdown (replaces native <select>) */
    .dd { position: relative; }
    .dd-btn { width: 100%; font: inherit; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 10px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; cursor: pointer; }
    .dd-caret { flex: none; color: #888; transition: transform 0.15s ease; }
    .dd.open .dd-caret { transform: rotate(180deg); }
    .dd.open .dd-btn { border-color: #4ade80; }
    .dd-menu { display: none; position: absolute; z-index: 30; top: calc(100% + 4px); left: 0; min-width: 100%;
      background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 4px; box-shadow: 0 10px 28px rgba(0,0,0,0.55); max-height: 260px; overflow: auto; white-space: nowrap; }
    .dd.open .dd-menu { display: block; }
    .dd-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .dd-item:hover { background: #1d1d1d; }
    .dd-item.sel { color: #4ade80; }
    .dd-item.dis { color: #555; cursor: default; }
    .dd-item.dis:hover { background: transparent; }
    .dd.compact .dd-btn { padding: 6px 9px; font-size: 12px; }
    main { flex: 1; display: flex; min-height: 0; }
    #side { width: 320px; border-right: 1px solid #222; padding: 12px; overflow: auto; }
    #side h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin: 4px 0 10px; display: flex; align-items: center; }
    .card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
    .camrow { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .camrow .cid { font-size: 11px; color: #777; width: 42px; }
    .camrow input { flex: 1; font: inherit; padding: 6px 8px; border-radius: 7px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; }
    .phone .name { font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .phone.off { opacity: 0.6; }
    .phone select { width: 100%; font: inherit; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; }
    .empty { color: #666; font-size: 13px; padding: 6px 0; }
    /* grid-auto-rows: max-content keeps each row as tall as the tile's 16:9 box.
       Without it, the grid (a definite-height flex child) collapses the auto rows
       shorter than the tiles, so tiles overflow and overlap the row below. */
    #grid { flex: 1; display: grid; gap: 10px; padding: 12px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); grid-auto-rows: max-content; align-content: start; min-height: 0; overflow: auto; }
    .tile { position: relative; background: #000; border: 1px solid #222; border-radius: 10px; overflow: hidden; aspect-ratio: 16 / 9; }
    body.recording .tile.takeable { cursor: pointer; }
    .tile.pgm { border-color: #ef4444; box-shadow: 0 0 0 2px #ef4444 inset, 0 0 16px rgba(239,68,68,0.55); }
    .tile .pgm-badge { position: absolute; top: 8px; right: 10px; display: none; background: #dc2626; color: #fff; }
    .tile.pgm .pgm-badge { display: inline-block; }
    .tile video { width: 100%; height: 100%; object-fit: cover; background: #000; }
    .tile .label { position: absolute; top: 8px; left: 10px; font-weight: 600; font-size: 13px; padding: 2px 8px; background: rgba(0,0,0,0.55); border-radius: 6px; }
    .tile .state { position: absolute; bottom: 8px; left: 10px; }
    .tile .stats { position: absolute; bottom: 8px; right: 10px; font-size: 11px; color: #aaa; padding: 2px 6px; background: rgba(0,0,0,0.5); border-radius: 6px; }
    .tile .offline-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge { padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .ok { background: #052e16; color: #4ade80; }
    .warn { background: #3a2e05; color: #fbbf24; }
    .bad { background: #3b0a0a; color: #f87171; }
    .muted { background: #1a1a1a; color: #888; }
    .recdot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; display: inline-block; }
    /* Modal (replaces native prompt/confirm) */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 18px; width: min(360px, 90vw); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    .modal h3 { margin: 0 0 10px; font-size: 16px; }
    .modal-msg { margin: 0 0 14px; color: #bbb; font-size: 14px; }
    .modal-input { width: 100%; font: inherit; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0f0f0f; color: #e8e8e8; margin-bottom: 14px; }
    .modal-input:focus { outline: none; border-color: #4ade80; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    /* Recordings modal */
    .recmodal { width: min(720px, 94vw); max-height: 82vh; display: flex; flex-direction: column; }
    .rec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .rec-head h3 { margin: 0; }
    .rec-body { overflow: auto; }
    .rec-sub { font-size: 12px; color: #888; margin-bottom: 10px; }
    .rec-sub a { color: #4ade80; text-decoration: none; }
    .rec-sub a:hover { text-decoration: underline; }
    /* Tabs */
    .rec-tabs { display: flex; gap: 2px; border-bottom: 1px solid #222; margin-bottom: 12px; flex: none; }
    .rec-tab { background: transparent; border: none; border-bottom: 2px solid transparent; border-radius: 0; padding: 8px 14px; color: #888; font-weight: 600; }
    .rec-tab:hover { color: #ccc; }
    .rec-tab.active { color: #e8e8e8; border-bottom-color: #16a34a; }
    /* Session cards */
    .session-card { display: flex; align-items: center; gap: 12px; background: #141414; border: 1px solid #242424; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .session-card .sc-main { flex: 1; min-width: 0; }
    .sc-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sc-meta { color: #888; font-size: 12px; }
    .sc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .cam-chip { display: inline-flex; align-items: center; gap: 6px; background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 999px; padding: 2px 10px 2px 7px; font-size: 12px; }
    .cam-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; display: inline-block; }
    .session-card .go { flex: none; }
    /* Clips: camera sub-tabs + groups */
    .clip-subtabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .clip-subtab { display: inline-flex; align-items: center; gap: 6px; background: #161616; border: 1px solid #2a2a2a; border-radius: 999px; padding: 5px 12px; color: #aaa; font-weight: 600; font-size: 12px; }
    .clip-subtab:hover { color: #e8e8e8; }
    .clip-subtab.active { background: rgba(22,163,74,0.18); border-color: #16a34a; color: #e8e8e8; }
    .cam-group { margin-bottom: 16px; }
    .cam-group-head { display: flex; align-items: center; gap: 8px; padding: 6px 2px; border-bottom: 1px solid #222; margin-bottom: 4px; }
    .cgh-label { font-weight: 600; }
    .cgh-id { color: #666; font-size: 12px; }
    .cgh-meta { color: #888; font-size: 12px; }
    .clip-row { display: flex; align-items: center; gap: 10px; padding: 7px 6px; border-radius: 8px; }
    .clip-row:hover { background: #161616; }
    .clip-row .clip-main { flex: 1; min-width: 0; }
    .clip-when { font-size: 13px; }
    .clip-file { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clip-size { color: #9aa0a6; font-size: 12px; flex: none; font-variant-numeric: tabular-nums; }
    .clip-dl { text-decoration: none; flex: none; }
    .clip-del, .sess-del { flex: none; }
    .clip-del:hover, .sess-del:hover { border-color: #dc2626; color: #f87171; }
    /* Pre-flight checklist */
    .pf-verdict { display: inline-block; margin-bottom: 10px; font-size: 14px; }
    .pf-row { display: flex; gap: 10px; align-items: baseline; padding: 6px 2px; border-bottom: 1px solid #1c1c1c; }
    .pf-row .pf-ico { flex: none; width: 16px; text-align: center; font-weight: 700; }
    .pf-row .pf-label { font-weight: 600; flex: none; min-width: 120px; }
    .pf-row .pf-detail { color: #888; font-size: 12px; }
    .pf-ok { color: #4ade80; } .pf-warn { color: #fbbf24; } .pf-bad { color: #f87171; }
    /* Session preview player */
    .player { width: min(900px, 94vw); max-height: 92vh; display: flex; flex-direction: column; }
    .player-stage { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 8px; overflow: hidden; }
    .player-stage video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; display: none; }
    .player-stage video.active { display: block; }
    .player-black { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #666; font-size: 13px; text-align: center; padding: 0 16px; }
    .player-camlabel { position: absolute; top: 8px; left: 10px; padding: 2px 8px; background: rgba(0,0,0,0.6); border-radius: 6px; font-weight: 600; font-size: 13px; z-index: 3; display: none; }
    .player-controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .player-time { font-variant-numeric: tabular-nums; color: #bbb; font-size: 13px; flex: none; }
    .player-bar { position: relative; flex: 1; height: 10px; background: #222; border-radius: 6px; cursor: pointer; }
    .player-fill { position: absolute; left: 0; top: 0; bottom: 0; background: #16a34a; border-radius: 6px; width: 0; pointer-events: none; }
    .player-marker { position: absolute; top: -3px; width: 2px; height: 16px; background: #f87171; transform: translateX(-1px); pointer-events: none; }
    /* Switch log */
    #switchlogList { max-height: 240px; overflow: auto; }
    .swrow { display: flex; gap: 8px; align-items: baseline; padding: 4px 2px; border-bottom: 1px solid #1c1c1c; font-size: 13px; }
    .swrow:last-child { border-bottom: none; }
    .swrow .swt { color: #f87171; font-variant-numeric: tabular-nums; width: 46px; flex: none; }
    .swrow .swl { color: #e8e8e8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <header>
    <h1>Operator</h1>
    <span id="conn" class="badge muted">connecting…</span>
    <span id="live" class="badge muted">0 live</span>
    <span id="recstate" class="badge muted">not recording</span>
    <label class="layout">Layout <span id="colsMount"></span></label>
    <button id="preflightBtn" class="stop sm">Pre-flight</button>
    <button id="recordingsBtn" class="stop sm">Recordings</button>
    <div class="spacer"></div>
    <button id="previewAll" class="go">Start Preview (all)</button>
    <button id="stopAll" class="stop">Stop Preview</button>
    <button id="recBtn" class="rec">● Record</button>
    <button id="stopRecBtn" class="stop" disabled>Stop Recording</button>
  </header>

  <main>
    <div id="side">
      <h2>Cameras <span class="spacer"></span><button id="addCam" class="sm">+ Add</button></h2>
      <div id="cameras" class="card"></div>

      <h2>Connected phones</h2>
      <div id="phones"></div>
      <div id="noPhones" class="empty">No phones connected. Open the phone page, enter a name, tap Join.</div>

      <h2>Switch log</h2>
      <div id="switchlogList" class="card"></div>
    </div>
    <div id="grid"></div>
  </main>

  <script>
    let lastState = { cameras: [], phones: [], slots: {}, recording: false, recordingStartedAt: null };
    const $ = (id) => document.getElementById(id);
    const setBadge = (el, cls, text) => { el.textContent = text; el.className = 'badge ' + cls; };
    const escapeHtml = (s) => (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    // While the operator is mid-interaction in the side panel (dropdown open or
    // typing a camera name), defer side-panel re-renders so we don't wipe it.
    let sidePanelBusy = false;
    function setBusy(b) { sidePanelBusy = b; if (!b) renderControl(); }

    // Themed modal — replaces native prompt()/confirm().
    // With `input`: resolves to the trimmed string or null (cancel).
    // Without: resolves true (confirm) or false (cancel).
    function showModal({ title, message, input, confirmLabel = 'OK', danger = false }) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal">
          <h3>${escapeHtml(title)}</h3>
          ${message ? `<p class="modal-msg">${escapeHtml(message)}</p>` : ''}
          ${input ? `<input class="modal-input" placeholder="${escapeHtml(input.placeholder || '')}" value="${escapeHtml(input.value || '')}" />` : ''}
          <div class="modal-actions">
            <button class="stop modal-cancel">Cancel</button>
            <button class="${danger ? 'rec' : 'go'} modal-ok">${escapeHtml(confirmLabel)}</button>
          </div></div>`;
        document.body.appendChild(overlay);
        const inputEl = overlay.querySelector('.modal-input');
        const done = (val) => { overlay.remove(); document.removeEventListener('keydown', onKey, true); resolve(val); };
        const ok = () => done(input ? (inputEl.value.trim() || null) : true);
        const cancel = () => done(input ? null : false);
        overlay.querySelector('.modal-ok').addEventListener('click', ok);
        overlay.querySelector('.modal-cancel').addEventListener('click', cancel);
        overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) cancel(); });
        function onKey(e) { if (e.key === 'Escape') cancel(); else if (e.key === 'Enter') { e.preventDefault(); ok(); } }
        document.addEventListener('keydown', onKey, true);
        if (inputEl) { inputEl.focus(); inputEl.select(); }
      });
    }

    // Lightweight custom dropdown — no library, matches the theme.
    // opts: [{value, label, disabled}]. Returns { el }.
    function createDropdown({ value, opts, onChange, placeholder, compact, onOpenChange }) {
      const root = document.createElement('div');
      root.className = 'dd' + (compact ? ' compact' : '');
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'dd-btn';
      const menu = document.createElement('div');
      menu.className = 'dd-menu';
      root.append(btn, menu);
      const labelOf = (v) => { const o = opts.find((o) => o.value === v); return o ? o.label : (placeholder || 'Select'); };
      btn.innerHTML = '<span class="dd-label"></span>'
        + '<svg class="dd-caret" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
      btn.querySelector('.dd-label').textContent = labelOf(value);
      for (const o of opts) {
        const item = document.createElement('div');
        item.className = 'dd-item' + (o.value === value ? ' sel' : '') + (o.disabled ? ' dis' : '');
        item.textContent = o.label;
        if (!o.disabled) item.addEventListener('click', () => { close(); onChange(o.value); });
        menu.appendChild(item);
      }
      function open() { root.classList.add('open'); if (onOpenChange) onOpenChange(true); document.addEventListener('pointerdown', outside, true); }
      function close() { root.classList.remove('open'); if (onOpenChange) onOpenChange(false); document.removeEventListener('pointerdown', outside, true); }
      function outside(e) { if (!root.contains(e.target)) close(); }
      btn.addEventListener('click', (e) => { e.stopPropagation(); root.classList.contains('open') ? close() : open(); });
      return { el: root };
    }

    // ---------- Control WebSocket ----------
    let ws = null, wsDelay = 1000;
    function connectWS() {
      ws = new WebSocket(`wss://${location.host}/ws/operator`);
      ws.onopen = () => { wsDelay = 1000; setBadge($('conn'), 'ok', 'connected'); };
      ws.onclose = () => { setBadge($('conn'), 'bad', 'reconnecting…'); setTimeout(connectWS, wsDelay); wsDelay = Math.min(wsDelay * 2, 30000); };
      ws.onmessage = (ev) => { const m = JSON.parse(ev.data); if (m.type === 'state') { lastState = m; renderControl(); syncGrid(); renderProgram(); renderSwitchLog(); } };
    }
    const send = (obj) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); };

    // ---------- Control panel ----------
    function renderControl() {
      if (sidePanelBusy) return;            // don't wipe an open dropdown / a field being typed in
      const cams = lastState.cameras || [];

      // Camera management
      const cbox = $('cameras');
      cbox.innerHTML = cams.length ? '' : '<div class="empty">No cameras. Add one.</div>';
      for (const c of cams) {
        const row = document.createElement('div');
        row.className = 'camrow';
        row.innerHTML = `<span class="cid">${c.id}</span>
          <input value="${escapeHtml(c.label)}" />
          <button class="sm stop" title="Remove">×</button>`;
        const input = row.querySelector('input');
        const commit = () => { setBusy(false); const v = input.value.trim(); if (v && v !== c.label) send({ type: 'renameCamera', id: c.id, label: v }); };
        input.addEventListener('focus', () => setBusy(true));
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
        row.querySelector('button').addEventListener('click', async () => {
          if (await showModal({ title: 'Remove camera', message: `Remove "${c.label}" (${c.id})?`, confirmLabel: 'Remove', danger: true })) {
            send({ type: 'removeCamera', id: c.id });
          }
        });
        cbox.appendChild(row);
      }

      // Phone roster
      const phones = lastState.phones || [];
      $('noPhones').style.display = phones.length ? 'none' : 'block';
      const host = $('phones');
      host.innerHTML = '';
      const taken = lastState.slots || {};
      for (const p of phones) {
        const offline = p.connected === false;
        const div = document.createElement('div');
        div.className = 'card phone' + (offline ? ' off' : '');
        const statusBadge = offline
          ? '<span class="badge bad">offline</span>'
          : `<span class="badge ${p.publishing ? 'ok' : 'muted'}">${p.publishing ? 'live' : 'standby'}</span>`;
        let batBadge = '';
        if (p.battery && typeof p.battery.level === 'number') {
          const pct = Math.round(p.battery.level * 100);
          const low = pct <= 20 && !p.battery.charging;
          batBadge = ` <span class="badge ${low ? 'bad' : 'muted'}">${pct}%${p.battery.charging ? ' ⚡' : ''}</span>`;
        }
        div.innerHTML = `<div class="name">${escapeHtml(p.name)} ${statusBadge}${batBadge}`
          + (offline ? '<span class="spacer"></span><button class="sm stop rmphone" title="Remove phone">×</button>' : '')
          + '</div>';
        if (offline) div.querySelector('.rmphone').addEventListener('click', () => send({ type: 'removePhone', phoneId: p.id }));
        const opts = [{ value: '', label: 'Unassigned' }].concat(cams.map((c) => {
          const otherOwner = taken[c.id] && taken[c.id] !== p.id;
          return { value: c.id, label: c.label + (otherOwner ? ' (taken)' : ''), disabled: !!otherOwner };
        }));
        const dd = createDropdown({
          value: p.slot || '', opts, placeholder: 'Unassigned',
          onOpenChange: setBusy,
          onChange: (v) => { if (v) send({ type: 'assign', phoneId: p.id, slot: v }); else send({ type: 'unassign', phoneId: p.id }); },
        });
        div.appendChild(dd.el);
        host.appendChild(div);
      }

      const liveCount = phones.filter((p) => p.publishing).length;
      setBadge($('live'), liveCount ? 'ok' : 'muted', `${liveCount} live`);
      if (lastState.recording) {
        $('recstate').innerHTML = `<span class="recdot"></span> REC ${fmtElapsed()}`;
        $('recstate').className = 'badge bad';
        $('recBtn').disabled = true; $('stopRecBtn').disabled = false;
      } else {
        setBadge($('recstate'), 'muted', 'not recording');
        $('recBtn').disabled = liveCount === 0; $('stopRecBtn').disabled = true;
      }
    }
    function fmtElapsed() {
      if (!lastState.recordingStartedAt) return '';
      const s = Math.max(0, Math.floor(Date.now() / 1000 - lastState.recordingStartedAt));
      return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }
    setInterval(() => { if (lastState.recording) renderControl(); }, 1000);

    $('addCam').addEventListener('click', async () => {
      const label = await showModal({ title: 'Add camera', input: { placeholder: 'e.g. Balcony' }, confirmLabel: 'Add' });
      if (label) send({ type: 'addCamera', label });
    });
    $('previewAll').addEventListener('click', () => send({ type: 'startPreview' }));
    $('stopAll').addEventListener('click', () => send({ type: 'stopPreview' }));
    $('recBtn').addEventListener('click', startRecordingFlow);
    $('stopRecBtn').addEventListener('click', () => send({ type: 'stopRecording' }));

    // On Record, ask for an optional session name and which camera to open on
    // (so the program starts on a real angle — no black pre-roll).
    function startRecordingFlow() {
      const live = (lastState.cameras || []).filter((c) => (lastState.phones || []).some((p) => p.slot === c.id && p.publishing));
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal">
        <h3>Start recording</h3>
        <input class="modal-input rec-name" placeholder="Session name (optional)" />
        <p class="modal-msg" style="margin:0 0 8px">Open the program on which camera? You can switch anytime (click a tile or press 1–9).</p>
        <div class="rec-focus"></div>
        <div class="modal-actions">
          <button class="stop rec-cancel">Cancel</button>
          <button class="go rec-nofocus">Start without a focus</button>
        </div></div>`;
      document.body.appendChild(overlay);
      const nameEl = overlay.querySelector('.rec-name');
      const focusBox = overlay.querySelector('.rec-focus');
      const done = () => { overlay.remove(); document.removeEventListener('keydown', onKey, true); };
      const startWith = (initialCam) => { done(); send({ type: 'startRecording', name: nameEl.value.trim() || undefined, initialCam }); };
      if (live.length) {
        for (const c of live) {
          const b = document.createElement('button');
          b.className = 'go'; b.style.cssText = 'display:block;width:100%;margin-bottom:6px;text-align:left';
          b.textContent = `${c.label} · ${c.id}`;
          b.addEventListener('click', () => startWith(c.id));
          focusBox.appendChild(b);
        }
      } else {
        focusBox.innerHTML = '<div class="empty">No camera is live yet — Start Preview first.</div>';
      }
      overlay.querySelector('.rec-nofocus').addEventListener('click', () => startWith(undefined));
      overlay.querySelector('.rec-cancel').addEventListener('click', done);
      overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) done(); });
      const onKey = (e) => { if (e.key === 'Escape') done(); };
      document.addEventListener('keydown', onKey, true);
      nameEl.focus();
    }

    // ---------- Recordings browser (modal, tabbed: Sessions / Clips) ----------
    const fmtBytes = (n) => { if (n < 1024) return n + ' B'; const u = ['KB', 'MB', 'GB', 'TB']; let i = -1; do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1); return n.toFixed(1) + ' ' + u[i]; };
    // Stable color per camera id (so the same angle reads the same everywhere).
    const colorForCam = (id) => { let h = 0; for (const ch of (id || '')) h = h * 31 + ch.charCodeAt(0); return `hsl(${Math.abs(h) % 360} 55% 55%)`; };
    const labelOfCam = (id) => { const c = (lastState.cameras || []).find((x) => x.id === id); return c ? c.label : id; };
    const sessionTitle = (s) => s.name || new Date((s.startedAt || 0) * 1000).toLocaleString();
    // MediaMTX filenames embed the local start time; reformat the literal parts.
    const fmtClipWhen = (name) => {
      const m = /(\d{4})-(\d\d)-(\d\d)_(\d\d)-(\d\d)-(\d\d)/.exec(name || '');
      if (!m) return '';
      const mon = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][+m[2] - 1];
      return `${mon} ${+m[3]}, ${m[4]}:${m[5]}:${m[6]}`;
    };

    // Per-session export control (button / progress / download), driven by the
    // /api/export job map. `i` is the index into the full sessions array.
    function exportControl(sid, name, i, exports) {
      const ex = (exports || {})[sid];
      if (ex && ex.status === 'running') {
        return `<button class="sm stop sess-export" data-idx="${i}" disabled>Exporting ${Math.round((ex.progress || 0) * 100)}%</button>`;
      }
      if (ex && ex.ready) {
        return `<a class="sm go" href="/api/export/download?id=${encodeURIComponent(sid)}" download="${escapeHtml(name || sid)}.mp4" style="text-decoration:none" title="Download rendered MP4">⬇ Download MP4</a>`
          + `<button class="sm stop sess-export" data-idx="${i}" title="Re-export">↻</button>`;
      }
      if (ex && ex.status === 'error') {
        return `<button class="sm stop sess-export" data-idx="${i}" title="${escapeHtml(ex.error || 'export failed')}">⚠ Export failed — retry</button>`;
      }
      return `<button class="sm stop sess-export" data-idx="${i}" title="Render the program edit to one MP4">⤓ Export</button>`;
    }

    function renderSessionsTab(sessions, selected, exports) {
      if (!sessions.length) return '<div class="empty">No sessions recorded yet. They appear here after you Record → Stop.</div>';
      const sub = `<div class="rec-sub">${sessions.length} session${sessions.length === 1 ? '' : 's'} · <a href="/api/sessions" download="switches.json">Download switches.json</a></div>`;
      // Camera sub-tabs: the union of cameras across all sessions (sessions carry
      // their own labels, so this works even for cameras since renamed/removed).
      const camMap = new Map();
      for (const s of sessions) for (const c of (s.cameras || [])) if (!camMap.has(c.id)) camMap.set(c.id, c.label || c.id);
      const cams = [...camMap.entries()].sort((a, b) => (a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0));
      const subtabs = cams.length ? ('<div class="clip-subtabs">'
        + `<button class="clip-subtab${selected === 'all' ? ' active' : ''}" data-cam="all">All</button>`
        + cams.map(([id, label]) => `<button class="clip-subtab${selected === id ? ' active' : ''}" data-cam="${escapeHtml(id)}">`
          + `<i class="cam-dot" style="background:${colorForCam(id)}"></i>${escapeHtml(labelOfCam(id) || label)}</button>`).join('')
        + '</div>') : '';
      const cards = sessions.map((s, i) => ({ s, i }))
        .filter(({ s }) => selected === 'all' || (s.cameras || []).some((c) => c.id === selected))
        .map(({ s, i }) => {
          const takes = (s.switches || []).length;
          const chips = (s.cameras || []).map((c) =>
            `<span class="cam-chip"><i class="cam-dot" style="background:${colorForCam(c.id)}"></i>${escapeHtml(c.label || c.id)}</span>`).join('');
          return `<div class="session-card"><div class="sc-main">
            <div class="sc-title">${escapeHtml(sessionTitle(s))}</div>
            <div class="sc-meta">${escapeHtml(new Date((s.startedAt || 0) * 1000).toLocaleString())} · ${fmtOffset(s.durationSec || 0)} · ${takes} take${takes === 1 ? '' : 's'}</div>
            <div class="sc-chips">${chips || '<span class="sc-meta">no cameras</span>'}</div>
          </div><button class="go sess-preview" data-idx="${i}">▶ Preview</button>`
          + exportControl(s.sessionId, s.name, i, exports)
          + `<button class="sm stop sess-del" data-idx="${i}" title="Delete session">🗑</button></div>`;
        }).reverse().join('');
      return sub + subtabs + (cards || '<div class="empty">No sessions for this camera.</div>');
    }

    function renderClipsTab(recCams, selected) {
      if (!recCams.length) return '<div class="empty">No clips captured yet.</div>';
      const subtabs = '<div class="clip-subtabs">'
        + `<button class="clip-subtab${selected === 'all' ? ' active' : ''}" data-cam="all">All</button>`
        + recCams.map((c) => `<button class="clip-subtab${selected === c.cam ? ' active' : ''}" data-cam="${escapeHtml(c.cam)}">`
          + `<i class="cam-dot" style="background:${colorForCam(c.cam)}"></i>${escapeHtml(labelOfCam(c.cam))}</button>`).join('')
        + '</div>';
      const groups = recCams.filter((c) => selected === 'all' || c.cam === selected).map((c) => {
        const label = labelOfCam(c.cam);
        const idSpan = label !== c.cam ? `<span class="cgh-id">${escapeHtml(c.cam)}</span>` : '';
        const head = `<div class="cam-group-head"><i class="cam-dot" style="background:${colorForCam(c.cam)}"></i>`
          + `<span class="cgh-label">${escapeHtml(label)}</span>${idSpan}`
          + `<span class="spacer"></span><span class="cgh-meta">${fmtBytes(c.totalBytes || 0)} · ${c.files.length} file${c.files.length === 1 ? '' : 's'}</span></div>`;
        if (!c.files.length) return `<div class="cam-group">${head}<div class="empty">none</div></div>`;
        const rows = c.files.map((f) => {
          const url = `/api/recordings/download?cam=${encodeURIComponent(c.cam)}&name=${encodeURIComponent(f.name)}`;
          return `<div class="clip-row"><div class="clip-main">
            <div class="clip-when">${escapeHtml(fmtClipWhen(f.name) || f.name)}</div>
            <div class="clip-file">${escapeHtml(f.name)}</div></div>
            <span class="clip-size">${fmtBytes(f.sizeBytes)}</span>
            <button class="sm go clip-play" data-cam="${escapeHtml(c.cam)}" data-name="${escapeHtml(f.name)}">▶ Play</button>
            <a class="sm stop clip-dl" href="${url}" download title="Download">⤓</a>
            <button class="sm stop clip-del" data-cam="${escapeHtml(c.cam)}" data-name="${escapeHtml(f.name)}" title="Delete">🗑</button></div>`;
        }).join('');
        return `<div class="cam-group">${head}${rows}</div>`;
      }).join('');
      return subtabs + (groups || '<div class="empty">No clips for this camera.</div>');
    }

    function openRecordings() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal recmodal">
        <div class="rec-head"><h3>Recordings</h3><span class="spacer"></span>
          <button class="sm stop rec-refresh">Refresh</button>
          <button class="sm stop rec-close">Close</button></div>
        <div class="rec-tabs">
          <button class="rec-tab active" data-tab="sessions">Sessions</button>
          <button class="rec-tab" data-tab="clips">Clips</button>
        </div>
        <div class="rec-body">Loading…</div></div>`;
      document.body.appendChild(overlay);
      const body = overlay.querySelector('.rec-body');
      const tabs = [...overlay.querySelectorAll('.rec-tab')];
      let active = 'sessions';
      let clipCam = 'all';                 // selected camera sub-tab within Clips
      let sessCam = 'all';                 // selected camera sub-tab within Sessions
      const data = { recCams: [], sess: [], exports: {} };
      let exportPoll = null;
      const startedExports = new Set();   // sids the operator kicked off this session
      const autoActed = new Set();        // sids we've already auto-downloaded / alerted on
      const close = () => { clearTimeout(exportPoll); overlay.remove(); document.removeEventListener('keydown', onKey, true); };
      const onKey = (e) => { if (e.key === 'Escape') close(); };
      document.addEventListener('keydown', onKey, true);
      overlay.querySelector('.rec-close').addEventListener('click', close);
      overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) close(); });

      function renderTab() {
        tabs.forEach((t) => t.classList.toggle('active', t.dataset.tab === active));
        if (active === 'sessions') {
          body.innerHTML = renderSessionsTab(data.sess, sessCam, data.exports);
          body.querySelectorAll('.clip-subtab').forEach((b) =>
            b.addEventListener('click', () => { sessCam = b.dataset.cam; renderTab(); }));
          body.querySelectorAll('.sess-preview').forEach((b) =>
            b.addEventListener('click', () => openSessionPreview(data.sess[Number(b.dataset.idx)], data.recCams)));
          body.querySelectorAll('.sess-del').forEach((b) =>
            b.addEventListener('click', () => deleteSession(data.sess[Number(b.dataset.idx)], data.recCams, load)));
          body.querySelectorAll('.sess-export').forEach((b) =>
            b.addEventListener('click', async () => {
              const sid = data.sess[Number(b.dataset.idx)].sessionId;
              b.disabled = true; b.textContent = 'Starting…';
              try {
                const res = await fetch(`/api/export?id=${encodeURIComponent(sid)}`, { method: 'POST' });
                if (!res.ok) {
                  const msg = await res.json().then((j) => j.error).catch(() => `HTTP ${res.status}`);
                  throw new Error(msg || `HTTP ${res.status}`);
                }
                startedExports.add(sid);
                autoActed.delete(sid);     // allow auto-download on this fresh run
              } catch (e) {
                showModal({ title: 'Export failed to start', message: String(e.message || e), confirmLabel: 'OK' });
              }
              pollExports();
            }));
        } else {
          body.innerHTML = renderClipsTab(data.recCams, clipCam);
          body.querySelectorAll('.clip-subtab').forEach((b) =>
            b.addEventListener('click', () => { clipCam = b.dataset.cam; renderTab(); }));
          body.querySelectorAll('.clip-play').forEach((b) =>
            b.addEventListener('click', () => openClipPreview(b.dataset.cam, b.dataset.name)));
          body.querySelectorAll('.clip-del').forEach((b) =>
            b.addEventListener('click', () => deleteClip(b.dataset.cam, b.dataset.name, load)));
        }
      }
      tabs.forEach((t) => t.addEventListener('click', () => { active = t.dataset.tab; renderTab(); }));

      // Poll the export job map while any job is running; re-render so the
      // Sessions tab reflects live progress and surfaces the download when done.
      // For exports the operator started this session, auto-download the finished
      // MP4 (and surface failures) so a click always produces visible feedback.
      function triggerDownload(sid) {
        const s = data.sess.find((x) => x.sessionId === sid);
        const a = document.createElement('a');
        a.href = `/api/export/download?id=${encodeURIComponent(sid)}`;
        a.download = ((s && s.name) || sid) + '.mp4';
        document.body.appendChild(a); a.click(); a.remove();
      }
      async function pollExports() {
        try { data.exports = await fetch('/api/export').then((r) => r.json()); } catch { return; }
        for (const sid of startedExports) {
          const j = data.exports[sid];
          if (!j || autoActed.has(sid)) continue;
          if (j.ready) { autoActed.add(sid); triggerDownload(sid); }
          else if (j.status === 'error') { autoActed.add(sid); showModal({ title: 'Export failed', message: String(j.error || 'unknown error'), confirmLabel: 'OK' }); }
        }
        if (active === 'sessions') renderTab();
        clearTimeout(exportPoll);
        if (Object.values(data.exports).some((j) => j && j.status === 'running')) exportPoll = setTimeout(pollExports, 1200);
      }

      async function load() {
        body.textContent = 'Loading…';
        try {
          const [recs, sessions, exports] = await Promise.all([
            fetch('/api/recordings').then((r) => r.json()),
            fetch('/api/sessions').then((r) => r.json()),
            fetch('/api/export').then((r) => r.json()).catch(() => ({})),
          ]);
          data.recCams = recs.cameras || [];
          data.sess = Array.isArray(sessions) ? sessions : [];
          data.exports = exports || {};
          renderTab();
          if (Object.values(data.exports).some((j) => j && j.status === 'running')) pollExports();
        } catch (e) { body.textContent = 'Failed to load recordings: ' + e.message; }
      }
      overlay.querySelector('.rec-refresh').addEventListener('click', load);
      load();
    }
    $('recordingsBtn').addEventListener('click', openRecordings);

    // Delete one clip after a confirmation, then re-render the list.
    async function deleteClip(cam, name, reload) {
      const ok = await showModal({ title: 'Delete clip',
        message: `Permanently delete "${name}"? This can't be undone.`, confirmLabel: 'Delete', danger: true });
      if (!ok) return;
      try {
        const res = await fetch(`/api/recordings/download?cam=${encodeURIComponent(cam)}&name=${encodeURIComponent(name)}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        if (reload) reload();
      } catch (e) {
        showModal({ title: 'Delete failed', message: e.message, confirmLabel: 'OK' });
      }
    }

    // Delete one session (switch-log entry) after a confirmation. The session's
    // clips are kept by default; an opt-in checkbox also deletes the per-camera
    // clip files matched to this session (same mtime matching as the preview
    // player). Custom modal — the themed showModal can't host a checkbox.
    function deleteSession(session, recCams, reload) {
      if (!session || !session.sessionId) return;
      const sid = session.sessionId;
      const matches = (session.cameras || [])
        .map((c) => ({ cam: c.id, name: fileForCam(recCams, c.id, session) }))
        .filter((m) => m.name);
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal">
        <h3>Delete session</h3>
        <p class="modal-msg">Remove "${escapeHtml(sessionTitle(session))}" from the switch log? This can't be undone.</p>
        ${matches.length ? `<label style="display:flex;gap:8px;align-items:flex-start;margin:0 0 14px;color:#bbb;font-size:14px;cursor:pointer">
          <input type="checkbox" class="del-clips" style="margin-top:2px" />
          <span>Also delete this session's ${matches.length} matched clip file${matches.length === 1 ? '' : 's'} (can't be undone)</span></label>`
          : '<p class="modal-msg" style="color:#888;font-size:12px">No clip files matched this session.</p>'}
        <div class="modal-actions">
          <button class="stop sd-cancel">Cancel</button>
          <button class="rec sd-ok">Delete</button>
        </div></div>`;
      document.body.appendChild(overlay);
      const done = () => { overlay.remove(); document.removeEventListener('keydown', onKey, true); };
      const onKey = (e) => { if (e.key === 'Escape') done(); };
      document.addEventListener('keydown', onKey, true);
      overlay.querySelector('.sd-cancel').addEventListener('click', done);
      overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) done(); });
      overlay.querySelector('.sd-ok').addEventListener('click', async () => {
        const alsoClips = matches.length && overlay.querySelector('.del-clips').checked;
        done();
        try {
          const res = await fetch(`/api/sessions?id=${encodeURIComponent(sid)}`, { method: 'DELETE' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          if (alsoClips) {
            await Promise.all(matches.map((m) =>
              fetch(`/api/recordings/download?cam=${encodeURIComponent(m.cam)}&name=${encodeURIComponent(m.name)}`, { method: 'DELETE' }).catch(() => {})));
          }
          if (reload) reload();
        } catch (e) {
          showModal({ title: 'Delete failed', message: e.message, confirmLabel: 'OK' });
        }
      });
    }

    // ---------- Single-clip preview (native controls) ----------
    function openClipPreview(cam, name) {
      const url = `/api/recordings/download?cam=${encodeURIComponent(cam)}&name=${encodeURIComponent(name)}`;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal player">
        <div class="rec-head"><h3>${escapeHtml(cam)} · ${escapeHtml(name)}</h3><span class="spacer"></span>
          <a class="sm stop" href="${url}" download style="text-decoration:none">Download</a>
          <button class="sm stop clip-close">Close</button></div>
        <div class="player-stage"><video class="active" controls autoplay playsinline></video></div></div>`;
      document.body.appendChild(overlay);
      const v = overlay.querySelector('video');
      v.src = url;
      const close = () => { v.pause(); v.removeAttribute('src'); v.load(); overlay.remove(); document.removeEventListener('keydown', onKey, true); };
      const onKey = (e) => { if (e.key === 'Escape') close(); };
      document.addEventListener('keydown', onKey, true);
      overlay.querySelector('.clip-close').addEventListener('click', close);
      overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) close(); });
    }

    // ---------- Session preview player ----------
    // Plays the program edit for a finished session: a single active <video> at a
    // time, driven by the switch log. Each per-angle clip is mapped onto the
    // session timeline via its recordStartedAt; at each take offset the active
    // angle swaps. Pre-roll (before the first take) and takes whose camera has no
    // file show a black "no footage" frame. Preview only — not a rendered export.

    // Match a session to one recording file per camera by mtime window (filenames
    // are local-time, so we key off the reliable fs mtime instead).
    function fileForCam(recCams, camId, session) {
      const entry = (recCams || []).find((c) => c.cam === camId);
      if (!entry || !entry.files.length) return null;
      const lo = (session.startedAt || 0) - 2, hi = (session.stoppedAt || 0) + 10;
      const cands = entry.files.filter((f) => f.modified >= lo && f.modified <= hi);
      if (!cands.length) return null;
      return cands.reduce((a, b) => (b.modified > a.modified ? b : a)).name;
    }

    function openSessionPreview(session, recCams) {
      if (!session) return;
      const dur = session.durationSec || 0;
      const start = session.startedAt || 0;

      // Per-camera clip + timeline offset.
      const cams = {};
      for (const c of (session.cameras || [])) {
        const name = fileForCam(recCams, c.id, session);
        cams[c.id] = {
          label: c.label || c.id,
          delay: (c.recordStartedAt || start) - start,
          url: name ? `/api/recordings/download?cam=${encodeURIComponent(c.id)}&name=${encodeURIComponent(name)}` : null,
        };
      }

      // Program segments from the ordered takes.
      const sw = (session.switches || []).slice().sort((a, b) => a.offset - b.offset);
      const segs = [];
      if (!sw.length) {
        const first = (session.cameras || [])[0];
        segs.push({ start: 0, end: dur, camId: first ? first.id : null });
      } else {
        if (sw[0].offset > 0.05) segs.push({ start: 0, end: sw[0].offset, camId: null });
        for (let i = 0; i < sw.length; i++) {
          segs.push({ start: sw[i].offset, end: i + 1 < sw.length ? sw[i + 1].offset : dur, camId: sw[i].camId });
        }
      }
      const segAt = (t) => segs.find((s) => t >= s.start && t < s.end) || segs[segs.length - 1] || { camId: null };
      // A camera taken but never recorded (e.g. an old session) isn't in cams[],
      // but the take itself carries its label.
      const labelFor = (id) => (cams[id] && cams[id].label) || (sw.find((s) => s.camId === id) || {}).label || id;

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal player">
        <div class="rec-head"><h3>Preview · ${escapeHtml(session.name || session.startedAtIso || '')}</h3><span class="spacer"></span>
          <button class="sm stop pl-close">Close</button></div>
        <div class="player-stage"><div class="player-camlabel"></div><div class="player-black">— before first take —</div></div>
        <div class="player-controls">
          <button class="go pl-play" style="min-width:84px">▶ Play</button>
          <span class="player-time">00:00 / ${fmtOffset(dur)}</span>
          <div class="player-bar"><div class="player-fill"></div></div>
        </div></div>`;
      document.body.appendChild(overlay);
      const stage = overlay.querySelector('.player-stage');
      const black = overlay.querySelector('.player-black');
      const camLabel = overlay.querySelector('.player-camlabel');
      const playBtn = overlay.querySelector('.pl-play');
      const timeEl = overlay.querySelector('.player-time');
      const bar = overlay.querySelector('.player-bar');
      const fill = overlay.querySelector('.player-fill');

      const vids = {};
      for (const [id, c] of Object.entries(cams)) {
        if (!c.url) continue;
        const v = document.createElement('video');
        v.playsInline = true; v.preload = 'auto'; v.muted = true; v.src = c.url;
        stage.insertBefore(v, black);
        vids[id] = v;
      }
      for (const s of sw) {
        if (!dur) break;
        const mk = document.createElement('div');
        mk.className = 'player-marker'; mk.style.left = `${(100 * s.offset) / dur}%`;
        mk.title = `${fmtOffset(s.offset)} · ${s.label || s.camId}`;
        bar.appendChild(mk);
      }

      let sessionTime = 0, playing = false, activeId = undefined, lastMs = 0, raf = 0;

      // A clip's footage can run out before its program segment ends (the phone
      // dropped early, or the clip was trimmed/short). Past that point keep the
      // timeline moving but show the black panel rather than a misleading frozen
      // last frame. Optimistic while the clip's duration is still unknown.
      const COVER_TOL = 0.3;   // a clip ending within this of a take still "covers" it
      function clipCovers(id, t) {
        const v = vids[id];
        if (!v) return false;
        const d = v.duration;
        if (!isFinite(d) || d <= 0) return true;     // metadata not loaded yet
        return t <= cams[id].delay + d + COVER_TOL;
      }
      // Black-panel text at session-time t: pre-roll, a camera with no clip on
      // disk, or a clip whose footage ran out before the take ended.
      function blackTextFor(t) {
        const seg = segAt(t);
        if (!seg.camId) return '— before first take —';
        return vids[seg.camId] ? `${labelFor(seg.camId)} — footage ended` : `no footage for ${labelFor(seg.camId)}`;
      }

      function showActive(id) {
        for (const [vid, v] of Object.entries(vids)) {
          const on = vid === id; v.classList.toggle('active', on); v.muted = !on; if (!on) v.pause();
        }
        if (id && vids[id]) { camLabel.textContent = cams[id].label; camLabel.style.display = 'block'; black.style.display = 'none'; }
        else {
          camLabel.style.display = 'none'; black.style.display = 'flex';
          black.textContent = blackTextFor(sessionTime);
        }
      }
      function setActiveFor(t) {
        const seg = segAt(t);
        const id = (seg.camId && vids[seg.camId] && clipCovers(seg.camId, t)) ? seg.camId : null;
        if (id !== activeId) {
          activeId = id;
          showActive(id);
          if (id) { try { vids[id].currentTime = Math.max(0, t - cams[id].delay); } catch {} if (playing) vids[id].play().catch(() => {}); }
        } else if (!id) {
          black.textContent = blackTextFor(t);
        }
      }
      function ui() { fill.style.width = `${(100 * Math.min(sessionTime, dur)) / (dur || 1)}%`; timeEl.textContent = `${fmtOffset(sessionTime)} / ${fmtOffset(dur)}`; }

      function tick(ms) {
        if (!playing) return;
        const a = activeId && vids[activeId];
        if (a && !a.paused && !a.seeking) sessionTime = a.currentTime + cams[activeId].delay;
        else sessionTime += (ms - lastMs) / 1000;     // advance through black/missing footage
        lastMs = ms;
        if (sessionTime >= dur) { sessionTime = dur; setActiveFor(dur); pause(); ui(); return; }
        setActiveFor(sessionTime);
        ui();
        raf = requestAnimationFrame(tick);
      }
      function play() {
        if (sessionTime >= dur) sessionTime = 0;
        playing = true; playBtn.textContent = '❚❚ Pause';
        activeId = undefined; setActiveFor(sessionTime);
        if (activeId && vids[activeId]) { try { vids[activeId].currentTime = Math.max(0, sessionTime - cams[activeId].delay); } catch {} vids[activeId].play().catch(() => {}); }
        lastMs = performance.now(); raf = requestAnimationFrame(tick);
      }
      function pause() { playing = false; playBtn.textContent = '▶ Play'; cancelAnimationFrame(raf); for (const v of Object.values(vids)) v.pause(); }
      function seekTo(t) {
        sessionTime = Math.max(0, Math.min(dur, t)); activeId = undefined; setActiveFor(sessionTime); ui();
        if (playing && activeId && vids[activeId]) { try { vids[activeId].currentTime = Math.max(0, sessionTime - cams[activeId].delay); } catch {} vids[activeId].play().catch(() => {}); }
        lastMs = performance.now();
      }

      playBtn.addEventListener('click', () => (playing ? pause() : play()));
      bar.addEventListener('click', (e) => { const r = bar.getBoundingClientRect(); seekTo(((e.clientX - r.left) / r.width) * dur); });
      const close = () => { pause(); for (const v of Object.values(vids)) { v.removeAttribute('src'); v.load(); } overlay.remove(); document.removeEventListener('keydown', onKey, true); };
      const onKey = (e) => { if (e.key === 'Escape') close(); else if (e.key === ' ') { e.preventDefault(); playing ? pause() : play(); } };
      document.addEventListener('keydown', onKey, true);
      overlay.querySelector('.pl-close').addEventListener('click', close);
      overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) close(); });

      setActiveFor(0); ui();
    }

    // ---------- Pre-flight check (modal) ----------
    // Per assigned camera: live? video H.264 (so recording stays copy-only)? audio?
    // Plus a disk-writable / free-space check from the control service.
    const VIDEO_CODEC = /h264|h265|hevc|vp8|vp9|av1/i;
    function preflightRows(paths, pre) {
      const byName = {};
      for (const i of (paths.items || [])) byName[i.name] = i;
      const slots = lastState.slots || {};
      const cams = (lastState.cameras || []).filter((c) => slots[c.id]);   // only cameras with a phone assigned
      const rows = [];
      if (!cams.length) rows.push({ cls: 'bad', label: 'Cameras', detail: 'No phone is assigned to a camera yet.' });
      for (const c of cams) {
        const it = byName[c.id] || {};
        const tracks = it.tracks || [];
        const live = !!it.ready;
        const hasVideo = tracks.some((t) => /h264/i.test(t));
        const hasAudio = tracks.some((t) => !VIDEO_CODEC.test(t));
        let cls, detail;
        if (!live) { cls = 'bad'; detail = 'not publishing — Start Preview first'; }
        else if (!hasVideo) { cls = 'bad'; detail = `video not H.264, recording would not be copy-only (${tracks.join(', ') || 'no tracks'})`; }
        else if (!hasAudio) { cls = 'warn'; detail = 'live, H.264 — but no audio track'; }
        else { cls = 'ok'; detail = `H.264 + audio (${tracks.join(', ')})`; }
        rows.push({ cls, label: `${c.label} · ${c.id}`, detail });
      }
      if (pre) {
        const gb = pre.freeBytes != null ? pre.freeBytes / 1e9 : null;
        if (!pre.recordingsWritable) rows.push({ cls: 'bad', label: 'Recording disk', detail: 'recordings folder is not writable' });
        else if (gb != null && gb < 2) rows.push({ cls: 'warn', label: 'Recording disk', detail: `writable, but only ${gb.toFixed(1)} GB free` });
        else rows.push({ cls: 'ok', label: 'Recording disk', detail: gb != null ? `writable · ${gb.toFixed(1)} GB free` : 'writable' });
      }
      return rows;
    }

    function openPreflight() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `<div class="modal recmodal">
        <div class="rec-head"><h3>Pre-flight check</h3><span class="spacer"></span>
          <button class="sm stop pf-refresh">Re-check</button>
          <button class="sm stop pf-close">Close</button></div>
        <div class="rec-body">Checking…</div></div>`;
      document.body.appendChild(overlay);
      const body = overlay.querySelector('.rec-body');
      const close = () => { overlay.remove(); document.removeEventListener('keydown', onKey, true); };
      const onKey = (e) => { if (e.key === 'Escape') close(); };
      document.addEventListener('keydown', onKey, true);
      overlay.querySelector('.pf-close').addEventListener('click', close);
      overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) close(); });
      const ICO = { ok: '✓', warn: '!', bad: '✗' };
      async function load() {
        body.textContent = 'Checking…';
        try {
          const [paths, pre] = await Promise.all([
            fetch('/paths-status', { cache: 'no-store' }).then((r) => r.json()),
            fetch('/api/preflight').then((r) => r.json()),
          ]);
          const rows = preflightRows(paths, pre);
          const bad = rows.some((r) => r.cls === 'bad'), warn = rows.some((r) => r.cls === 'warn');
          const verdict = bad ? { cls: 'bad', text: 'Not ready' } : warn ? { cls: 'warn', text: 'Ready with warnings' } : { cls: 'ok', text: 'Ready to record' };
          body.innerHTML = `<span class="pf-verdict badge ${verdict.cls}">${verdict.text}</span>`
            + rows.map((r) => `<div class="pf-row"><span class="pf-ico pf-${r.cls}">${ICO[r.cls]}</span>`
              + `<span class="pf-label">${escapeHtml(r.label)}</span><span class="pf-detail">${escapeHtml(r.detail)}</span></div>`).join('');
        } catch (e) { body.textContent = 'Pre-flight failed: ' + e.message; }
      }
      overlay.querySelector('.pf-refresh').addEventListener('click', load);
      load();
    }
    $('preflightBtn').addEventListener('click', openPreflight);

    // ---------- WHEP multiview (dynamic tiles) ----------
    const tiles = {};
    const grid = $('grid');

    // Grid column layout (Auto / fixed N per row), remembered across sessions.
    function applyCols(v) {
      grid.style.gridTemplateColumns = v === 'auto' ? 'repeat(auto-fit, minmax(300px, 1fr))' : `repeat(${v}, 1fr)`;
    }
    let savedCols = localStorage.getItem('gridCols') || 'auto';
    function mountColsDropdown() {
      const dd = createDropdown({
        value: savedCols, compact: true,
        opts: [{ value: 'auto', label: 'Auto' }, { value: '2', label: '2' }, { value: '3', label: '3' }, { value: '4', label: '4' }],
        onChange: (v) => { savedCols = v; localStorage.setItem('gridCols', v); applyCols(v); $('colsMount').innerHTML = ''; mountColsDropdown(); },
      });
      $('colsMount').appendChild(dd.el);
    }
    applyCols(savedCols);
    mountColsDropdown();

    function syncGrid() {
      const cams = lastState.cameras || [];
      const ids = new Set(cams.map((c) => c.id));
      for (const id of Object.keys(tiles)) {            // remove tiles for deleted cameras
        if (!ids.has(id)) { teardown(id); tiles[id].root.remove(); delete tiles[id]; }
      }
      for (const c of cams) {
        if (!tiles[c.id]) {                              // create tile for new camera
          const el = document.createElement('div');
          el.className = 'tile';
          el.innerHTML = `<video autoplay playsinline muted></video><div class="offline-overlay">offline</div>
            <span class="label"></span><span class="pgm-badge badge">PGM</span><span class="state badge muted">offline</span><span class="stats"></span>`;
          el.addEventListener('click', () => takeProgram(c.id));
          grid.appendChild(el);
          tiles[c.id] = { root: el, video: el.querySelector('video'), overlay: el.querySelector('.offline-overlay'),
            state: el.querySelector('.state'), stats: el.querySelector('.stats'), label: el.querySelector('.label'), pc: null, lastBytes: 0, lastTs: 0 };
        }
        tiles[c.id].label.textContent = `${c.label} · ${c.id}`;
      }
    }

    // ---------- Switch log (program takes) ----------
    // "Take" a camera as the program feed. Only meaningful while recording — the
    // log is the editorial cut list aligned to the recordings. Server skips
    // consecutive duplicate takes of the same camera.
    // A camera can be taken only while recording AND only if it's part of this
    // session's recording set (server stamps cameraRecordStartedAt at Record).
    const recordable = (id) => !!lastState.recording && (lastState.cameraRecordStartedAt || {})[id] != null;
    function takeProgram(id) { if (recordable(id)) send({ type: 'switch', camId: id }); }
    const currentProgram = () => (lastState.switches || []).slice(-1)[0]?.camId || null;
    function renderProgram() {
      const pgm = lastState.recording ? currentProgram() : null;
      document.body.classList.toggle('recording', !!lastState.recording);
      for (const id of Object.keys(tiles)) {
        tiles[id].root.classList.toggle('pgm', id === pgm);
        tiles[id].root.classList.toggle('takeable', recordable(id));   // drives the pointer cursor
      }
    }
    const fmtOffset = (sec) => { sec = Math.max(0, Math.floor(sec || 0)); return `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`; };
    function renderSwitchLog() {
      const box = $('switchlogList');
      const sw = lastState.switches || [];
      if (sw.length === 0) {
        box.innerHTML = `<div class="empty">${lastState.recording
          ? 'Recording — click a tile or press 1–9 to mark the program camera.'
          : 'Start recording, then click a tile (or press 1–9) to mark the program camera.'}</div>`;
        return;
      }
      box.innerHTML = sw.map((s) => `<div class="swrow"><span class="swt">${fmtOffset(s.offset)}</span><span class="swl">${escapeHtml(s.label || s.camId)}</span></div>`).join('');
      box.scrollTop = box.scrollHeight;
    }

    // Vision-mixer style: number keys take the Nth camera (in list order).
    document.addEventListener('keydown', (e) => {
      if (!lastState.recording) return;
      if (document.querySelector('.modal-overlay')) return;
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (e.key >= '1' && e.key <= '9') {
        const cam = (lastState.cameras || [])[Number(e.key) - 1];
        if (cam) { e.preventDefault(); takeProgram(cam.id); }
      }
    });

    function setTile(id, cls, text, overlay) { const t = tiles[id]; if (!t) return; t.state.className = 'state badge ' + cls; t.state.textContent = text; t.overlay.style.display = overlay ? 'flex' : 'none'; }
    function waitIce(pc) { return new Promise((r) => { if (pc.iceGatheringState === 'complete') return r(); const f = () => { if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', f); r(); } }; pc.addEventListener('icegatheringstatechange', f); setTimeout(r, 2000); }); }

    async function subscribe(id) {
      const t = tiles[id]; if (!t) return;
      setTile(id, 'warn', 'connecting…', true);
      const pc = new RTCPeerConnection({ iceServers: [] });
      t.pc = pc;
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });
      pc.ontrack = (e) => { t.video.srcObject = e.streams[0]; };
      pc.onconnectionstatechange = () => { const s = pc.connectionState; if (s === 'connected') setTile(id, 'ok', 'live', false); else if (s === 'failed' || s === 'disconnected') setTile(id, 'bad', s, false); };
      try {
        await pc.setLocalDescription(await pc.createOffer());
        await waitIce(pc);
        const res = await fetch(`/${id}/whep`, { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: pc.localDescription.sdp });
        if (!res.ok) throw new Error('WHEP ' + res.status);
        await pc.setRemoteDescription({ type: 'answer', sdp: await res.text() });
      } catch (e) { teardown(id); setTile(id, 'muted', 'offline', true); }
    }
    function teardown(id) { const t = tiles[id]; if (!t) return; if (t.pc) { try { t.pc.close(); } catch {} t.pc = null; } t.video.srcObject = null; t.lastBytes = 0; t.lastTs = 0; t.stats.textContent = ''; }
    const isLive = (pc) => pc && ['new', 'connecting', 'connected', 'checking'].includes(pc.connectionState);

    async function pollPaths() {
      let ready = {};
      try { const d = await (await fetch('/paths-status', { cache: 'no-store' })).json(); for (const i of (d.items || [])) ready[i.name] = i.ready; } catch {}
      for (const id of Object.keys(tiles)) {
        if (ready[id] && !isLive(tiles[id].pc)) { teardown(id); subscribe(id); }
        if (!ready[id] && tiles[id].pc) { teardown(id); setTile(id, 'muted', 'offline', true); }
      }
    }
    setInterval(async () => {
      for (const id of Object.keys(tiles)) { const t = tiles[id]; if (!t.pc || t.pc.connectionState !== 'connected') continue;
        (await t.pc.getStats()).forEach((r) => { if (r.type === 'inbound-rtp' && r.kind === 'video') { if (t.lastTs) t.stats.textContent = `${Math.round(((r.bytesReceived - t.lastBytes) * 8) / (r.timestamp - t.lastTs))} kbps`; t.lastBytes = r.bytesReceived; t.lastTs = r.timestamp; } }); }
    }, 1000);

    connectWS();
    renderControl();
    renderSwitchLog();
    pollPaths();
    setInterval(pollPaths, 2000);
  </script>
</body>
</html>
