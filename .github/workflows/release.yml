name: release

# Build the Windows installer and publish it to a GitHub Release so users
# don't have to build it themselves. Tag a commit `v0.1.0` (etc.) to cut a
# release; trigger manually from the Actions tab to test the pipeline
# without publishing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      # Pulls mkcert, MediaMTX, ffmpeg, ffprobe into ./tools (~0.5 GB).
      - name: Fetch native tools
        run: npm run setup

      # Builds the SEA launcher exe, then the Inno Setup installer.
      - name: Build installer
        run: npm run build:installer

      # Always upload the artifact (manual runs included) for inspection.
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WirelessMulticamStudio-Setup
          path: dist/WirelessMulticamStudio-Setup.exe
          if-no-files-found: error

      # Tag pushes (`v*`) become public releases; manual runs stop above.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WirelessMulticamStudio-Setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
