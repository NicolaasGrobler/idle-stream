<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Multicam Device</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0a0a0a; color: #e8e8e8;
      font: 16px/1.4 -apple-system, system-ui, Segoe UI, Roboto, sans-serif; }
    body { position: relative; overflow: hidden; }
    /* Live camera fills the screen (a viewfinder); hidden until joined. */
    #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000; display: none; z-index: 0; }
    body.live #video { display: block; }
    body.screen #video { object-fit: contain; }   /* show the whole shared screen, not a cropped fill */
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 4; display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: linear-gradient(180deg, rgba(0,0,0,0.72), rgba(0,0,0,0)); }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; flex: 1; }
    input, select, button { font: inherit; padding: 12px 14px; border-radius: 10px; border: 1px solid #333; background: #161616; color: #e8e8e8; }
    button.primary { background: #16a34a; border-color: #16a34a; color: #fff; font-weight: 700; }
    button:disabled { opacity: 0.4; }
    .badge { padding: 3px 10px; border-radius: 999px; font-size: 13px; font-weight: 600; }
    .ok { background: #052e16; color: #4ade80; }
    .warn { background: #3a2e05; color: #fbbf24; }
    .bad { background: #3b0a0a; color: #f87171; }
    .muted { background: #1a1a1a; color: #888; }
    .rec { display: none; align-items: center; gap: 6px; color: #f87171; font-weight: 800; font-size: 15px; }
    .rec .dot { width: 12px; height: 12px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 10px #ef4444; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: 0.35; } }
    .hidden { display: none !important; }

    /* Pre-join: centered join card (no dead black video box before joining). */
    #join { position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; padding: 18px; overflow: auto; }
    #join .card { width: 100%; max-width: 380px; background: #141414; border: 1px solid #242424; border-radius: 16px;
      padding: 22px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 24px 64px rgba(0,0,0,0.55); }
    #join .card-title { font-size: 22px; font-weight: 800; }
    #join .card-sub { margin: -6px 0 2px; color: #9aa0a6; font-size: 14px; }
    #join input, #join select, #join button { width: 100%; }
    #join .setup-link { color: #9aa0a6; font-size: 13px; text-decoration: none; text-align: center; }

    /* Armed: large status overlaid on the viewfinder (readable in landscape). */
    #armed { position: fixed; top: 54px; left: 12px; z-index: 3; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
    .hud-row { display: flex; align-items: center; gap: 8px; }
    .hud-tag { font-size: 11px; letter-spacing: 0.09em; color: #d4d8db; background: rgba(0,0,0,0.55); padding: 5px 9px; border-radius: 7px; }
    #slot { font-size: 30px; font-weight: 800; letter-spacing: 0.02em; padding: 4px 12px; border-radius: 10px; background: rgba(0,0,0,0.55); }
    #slot.ok { color: #4ade80; } #slot.muted { color: #b9bdc1; }
    #armed .badge { font-size: 14px; background: rgba(0,0,0,0.6); }
    #bitrate { color: #d4d8db; font-size: 13px; background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 6px; }

    /* Debug log: tucked behind a small button so it never crowds the viewfinder. */
    #logBtn { position: fixed; right: 10px; bottom: 10px; z-index: 5; width: 32px; height: 32px; padding: 0; border-radius: 50%; opacity: 0.4; font-weight: 700; }
    #log { position: fixed; left: 8px; right: 8px; bottom: 50px; z-index: 5; margin: 0; padding: 10px; background: rgba(17,17,17,0.96);
      border: 1px solid #222; border-radius: 8px; font-size: 12px; white-space: pre-wrap; word-break: break-word; max-height: 42vh; overflow: auto; }

    .rotate { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: rgba(10,10,10,0.93); color: #fbbf24; font-size: 20px; font-weight: 700; text-align: center; }
    .rotate .ico { font-size: 56px; line-height: 1; }
    /* Audio-only mode: a centered mic glyph over the (pictureless) viewfinder. */
    #audioInd { position: fixed; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; font-size: 90px; color: #2a2a2a; pointer-events: none; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div id="audioInd" class="hidden">&#x1F399;</div>

  <header>
    <h1>Camera</h1>
    <span id="rec" class="rec"><span class="dot"></span>REC</span>
    <span id="bat" class="badge muted hidden"></span>
    <span id="conn" class="badge muted">offline</span>
  </header>

  <div id="rotate" class="rotate hidden"><div class="ico">&#x21BB;</div>Rotate to landscape</div>

  <!-- Pre-join: a centered card (no dead black video box) -->
  <div id="join">
    <div class="card">
      <div class="card-title">Wireless Multicam</div>
      <p class="card-sub">Use this device as a camera or screen. Pick a source and tap Join.</p>
      <input id="name" placeholder="Device name (e.g. Nicol's iPhone)" autocomplete="off" aria-label="Device name" />
      <select id="source" aria-label="Capture source">
        <option value="camera" selected>Camera</option>
        <option value="screen">Screen share</option>
        <option value="audio">Audio only (mic)</option>
      </select>
      <select id="facing" aria-label="Camera direction">
        <option value="environment" selected>Back camera</option>
        <option value="user">Front camera</option>
      </select>
      <select id="mic" class="hidden" aria-label="Microphone"><option value="">Default microphone</option></select>
      <button id="joinBtn" class="primary">Join</button>
      <a href="setup.html" class="setup-link">First time on this device? Set it up &amp; install the certificate &rarr;</a>
    </div>
  </div>

  <!-- Armed: status overlaid on the live viewfinder -->
  <div id="armed" class="hidden">
    <div class="hud-row"><span id="hudtag" class="hud-tag">CAMERA</span><span id="slot" class="muted">—</span></div>
    <div class="hud-row"><span id="status" class="badge muted">waiting for operator</span><span id="bitrate"></span></div>
  </div>

  <button id="logBtn" title="Show log" aria-label="Show log">i</button>
  <pre id="log" class="hidden"></pre>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = (m) => { $('log').textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + $('log').textContent; };
    const setBadge = (el, cls, text) => { el.textContent = text; el.className = 'badge ' + cls; };

    // Target publish bitrate at 1080p30 (recording is copy-only, so this is the
    // recording quality). The operator owns it now: the publish command carries
    // an effective bitrate, and a live {type:'bitrate'} message adjusts it
    // mid-session. This default only applies until the first command arrives.
    const DEFAULT_BITRATE = 8_000_000;
    let currentBitrate = DEFAULT_BITRATE;

    // Persistent identity: survives WiFi blips / reloads so the operator keeps
    // this phone's camera-slot assignment instead of seeing a new phone.
    const phoneId = (() => {
      let id = localStorage.getItem('phoneId');
      if (!id) { id = (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(16).slice(2)); localStorage.setItem('phoneId', id); }
      return id;
    })();

    let ws = null, stream = null, pc = null, statsTimer = null;
    let assignedSlot = null, publishing = false, reconnectDelay = 1000;
    // wantPublish = the operator told us to publish and hasn't told us to stop. If
    // the WebRTC media drops while this is set, we re-publish ourselves instead of
    // sitting dead until the operator notices — minimising the recording gap (every
    // re-publish opens a fresh MediaMTX file, so the shorter the drop the fewer/
    // smaller the split segments the dashboard has to stitch back together).
    let wantPublish = false, republishTimer = null;
    let battery = null;   // {level 0-1, charging} where the Battery API exists (not iOS)
    let captureKind = 'camera';   // 'camera' | 'screen'

    // Screen share needs getDisplayMedia, which iOS (all browsers — WebKit) lacks.
    // Feature-detect: hide the option where it isn't available rather than assume
    // device/OS. Toggle the facing selector to match the chosen source.
    const screenSupported = !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
    (function initSourceSelect() {
      const src = $('source');
      if (!screenSupported) src.querySelector('option[value="screen"]').remove();
      const sync = () => {
        $('facing').classList.toggle('hidden', src.value !== 'camera');
        $('mic').classList.toggle('hidden', src.value !== 'audio');
        if (src.value === 'audio') populateMics();
      };
      src.addEventListener('change', sync); sync();
    })();

    // List audio inputs so the operator can pick the right mic (the external/DJI
    // mic usually isn't the OS default). Device labels need a permission grant,
    // so request the mic once, then enumerate.
    let micsListed = false;
    async function populateMics() {
      if (micsListed) return;
      try {
        const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
        tmp.getTracks().forEach((t) => t.stop());
      } catch { return; }   // denied — keep "Default microphone"
      try {
        const devs = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === 'audioinput');
        const sel = $('mic');
        sel.innerHTML = '<option value="">Default microphone</option>'
          + devs.map((d, i) => `<option value="${d.deviceId}">${(d.label || ('Microphone ' + (i + 1))).replace(/[<>&]/g, '')}</option>`).join('');
        micsListed = true;
      } catch {}
    }

    // ----- Acquire the capture source (camera | screen | audio) -----
    const RAW_AUDIO = { echoCancellation: false, noiseSuppression: false, autoGainControl: false };
    async function acquireSource() {
      const v = $('source').value;
      captureKind = v === 'screen' ? 'screen' : v === 'audio' ? 'audio' : 'camera';
      if (captureKind === 'screen') {
        // audio:true so the browser's share dialog offers a "share audio" checkbox;
        // if the user declines, the screen source is simply video-only.
        stream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: { ideal: 30 } }, audio: true,
        });
        const vt = stream.getVideoTracks()[0];   // browser "Stop sharing" ends this
        if (vt) vt.addEventListener('ended', onScreenEnded);
      } else if (captureKind === 'audio') {
        // Audio-only external mic: no video track at all.
        const deviceId = $('mic').value;
        stream = await navigator.mediaDevices.getUserMedia({
          video: false,
          audio: deviceId ? { deviceId: { exact: deviceId }, ...RAW_AUDIO } : RAW_AUDIO,
        });
      } else {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: $('facing').value, width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
          audio: RAW_AUDIO,
        });
      }
      $('video').srcObject = stream;
    }

    function onScreenEnded() {
      log('Screen sharing stopped.');
      wantPublish = false;
      stopPublish();
      setBadge($('status'), 'bad', 'screen sharing stopped');
      $('slot').classList.remove('ok');
    }

    // ----- WHIP publish -----
    function preferH264(peer) {
      if (!('setCodecPreferences' in RTCRtpTransceiver.prototype)) return;
      for (const t of peer.getTransceivers()) {
        if (!(t.sender && t.sender.track && t.sender.track.kind === 'video')) continue;
        const caps = RTCRtpSender.getCapabilities('video');
        if (!caps) continue;
        const h264 = caps.codecs.filter((c) => /h264/i.test(c.mimeType));
        const rest = caps.codecs.filter((c) => !/h264/i.test(c.mimeType));
        if (h264.length) { try { t.setCodecPreferences([...h264, ...rest]); } catch {} }
      }
    }
    // Apply currentBitrate to the live video sender (no renegotiation needed).
    async function applyBitrate() {
      if (!pc) return;
      const v = pc.getSenders().find((s) => s.track && s.track.kind === 'video');
      if (!v) return;
      const pr = v.getParameters();
      if (!pr.encodings || !pr.encodings.length) pr.encodings = [{}];
      pr.encodings[0].maxBitrate = currentBitrate;
      try { await v.setParameters(pr); } catch {}
    }
    function waitIce(peer) {
      return new Promise((resolve) => {
        if (peer.iceGatheringState === 'complete') return resolve();
        const f = () => { if (peer.iceGatheringState === 'complete') { peer.removeEventListener('icegatheringstatechange', f); resolve(); } };
        peer.addEventListener('icegatheringstatechange', f);
        setTimeout(resolve, 2000);
      });
    }

    // Re-publish after a media drop, but only if the operator still wants us live
    // and the connection hasn't recovered on its own. 'disconnected' is often a
    // transient ICE blip that self-heals (same connection, NO new file), so give it
    // a grace period; 'failed' is terminal, so retry quickly.
    function scheduleRepublish(delay) {
      clearTimeout(republishTimer);
      republishTimer = setTimeout(() => {
        republishTimer = null;
        if (!wantPublish || !assignedSlot) return;
        if (pc && pc.connectionState === 'connected') return;   // recovered itself
        log('Link dropped — re-publishing…');
        startPublish(assignedSlot);
      }, delay);
    }

    async function startPublish(slot) {
      if (!slot) return;
      if (pc && pc.connectionState === 'connected') return;   // already live
      clearTimeout(republishTimer); republishTimer = null;     // this attempt supersedes any pending retry
      if (pc) { try { pc.close(); } catch {} pc = null; }       // clear a stale/dead pc so reconnect can re-publish
      publishing = false;
      if (!stream) { log('No capture source; cannot publish.'); return; }
      setBadge($('status'), 'warn', 'connecting…');
      pc = new RTCPeerConnection({ iceServers: [] });
      pc.onconnectionstatechange = () => {
        if (!pc) return;
        const s = pc.connectionState;
        if (s === 'connected') { clearTimeout(republishTimer); republishTimer = null; setBadge($('status'), 'ok', 'LIVE'); sendStatus(true); }
        else if (s === 'failed') { setBadge($('status'), 'bad', 'failed'); sendStatus(false); if (wantPublish) scheduleRepublish(800); }
        else if (s === 'disconnected') { setBadge($('status'), 'bad', 'reconnecting…'); sendStatus(false); if (wantPublish) scheduleRepublish(4000); }
      };
      stream.getTracks().forEach((t) => pc.addTrack(t, stream));
      preferH264(pc);
      try {
        await pc.setLocalDescription(await pc.createOffer());
        await waitIce(pc);
        const res = await fetch(`/${slot}/whip`, { method: 'POST', headers: { 'Content-Type': 'application/sdp' }, body: pc.localDescription.sdp });
        if (!res.ok) throw new Error('WHIP ' + res.status);
        await pc.setRemoteDescription({ type: 'answer', sdp: await res.text() });
        await applyBitrate();
        publishing = true;
        startStats();
        log(`Publishing to ${slot}.`);
      } catch (e) {
        setBadge($('status'), 'bad', 'error');
        log('Publish failed: ' + e.message);
        stopPublish();
        if (wantPublish) scheduleRepublish(1500);   // server blip — keep trying while still armed
      }
    }

    function stopPublish() {
      clearTimeout(republishTimer); republishTimer = null;   // cancel any pending recovery
      if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
      if (pc) { try { pc.close(); } catch {} pc = null; }
      publishing = false;
      $('bitrate').textContent = '';
      if (assignedSlot) setBadge($('status'), 'muted', 'standby'); else setBadge($('status'), 'muted', 'waiting for operator');
      sendStatus(false);
    }

    function startStats() {
      let lb = 0, lt = 0;
      statsTimer = setInterval(async () => {
        if (!pc) return;
        (await pc.getStats()).forEach((r) => {
          if (r.type === 'outbound-rtp' && r.kind === 'video') {
            if (lt) $('bitrate').textContent = `· ${Math.round(((r.bytesSent - lb) * 8) / (r.timestamp - lt))} kbps`;
            lb = r.bytesSent; lt = r.timestamp;
          }
        });
      }, 1000);
    }

    // ----- Control WebSocket -----
    function sendStatus(pub) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'status', publishing: pub, battery })); }

    // ----- Battery (reported to the operator; unsupported on iOS Safari) -----
    function renderBattery() {
      const el = $('bat');
      if (!battery) { el.classList.add('hidden'); return; }
      const pct = Math.round(battery.level * 100);
      const low = pct <= 20 && !battery.charging;
      el.classList.remove('hidden');
      el.textContent = `${pct}%${battery.charging ? ' ⚡' : ''}`;
      el.className = 'badge ' + (low ? 'bad' : 'muted');
    }
    async function initBattery() {
      if (!navigator.getBattery) return;          // iOS / unsupported: skip silently
      try {
        const b = await navigator.getBattery();
        const update = () => { battery = { level: b.level, charging: b.charging }; renderBattery(); sendStatus(publishing); };
        b.addEventListener('levelchange', update);
        b.addEventListener('chargingchange', update);
        update();
      } catch {}
    }

    // ----- Landscape guidance (hard lock unsupported on iOS; overlay everywhere) -----
    const portraitMM = window.matchMedia('(orientation: portrait)');
    function updateOrientation() {
      const armed = !$('armed').classList.contains('hidden');
      // Screen share has no "landscape" preference — only nudge phone cameras.
      $('rotate').classList.toggle('hidden', !(armed && captureKind === 'camera' && portraitMM.matches));
    }
    portraitMM.addEventListener('change', updateOrientation);
    $('logBtn').addEventListener('click', () => $('log').classList.toggle('hidden'));

    function connectWS(name) {
      ws = new WebSocket(`wss://${location.host}/ws/phone`);
      ws.onopen = () => {
        reconnectDelay = 1000;
        setBadge($('conn'), 'ok', 'connected');
        ws.send(JSON.stringify({ type: 'register', name, phoneId, kind: captureKind }));
        sendStatus(publishing);   // also conveys current battery to the operator
      };
      ws.onclose = () => {
        setBadge($('conn'), 'bad', 'reconnecting…');
        setTimeout(() => connectWS(name), reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      };
      ws.onmessage = (ev) => handleControl(JSON.parse(ev.data), name);
    }

    function handleControl(msg, name) {
      if (msg.type === 'registered') {
        log('Registered with operator.');
        $('rec').style.display = msg.recording ? 'flex' : 'none';
      } else if (msg.type === 'assigned') {
        assignedSlot = msg.slot;
        $('slot').textContent = assignedSlot ? (msg.label || assignedSlot) : '—';
        $('slot').className = assignedSlot ? 'ok' : 'muted';
        if (!assignedSlot) { wantPublish = false; if (publishing) stopPublish(); }
        if (!publishing) setBadge($('status'), assignedSlot ? 'muted' : 'muted', assignedSlot ? 'standby' : 'waiting for operator');
        log(assignedSlot ? `Assigned to ${assignedSlot}.` : 'Unassigned.');
      } else if (msg.type === 'command') {
        if (msg.action === 'publish') {
          if (msg.bitrate) currentBitrate = msg.bitrate;   // operator-set effective bitrate
          wantPublish = true;
          startPublish(msg.slot || assignedSlot);
        } else if (msg.action === 'stop') { wantPublish = false; stopPublish(); }
      } else if (msg.type === 'bitrate') {
        if (msg.bitrate) { currentBitrate = msg.bitrate; applyBitrate(); }   // live change, no renegotiation
      } else if (msg.type === 'recording') {
        $('rec').style.display = msg.on ? 'flex' : 'none';
      }
    }

    // ----- Join -----
    $('joinBtn').addEventListener('click', async () => {
      $('joinBtn').disabled = true;
      try {
        await acquireSource();
        const name = $('name').value.trim() || ({ screen: 'Screen', audio: 'Mic', camera: 'Camera' }[captureKind]);
        $('hudtag').textContent = { screen: 'SCREEN', audio: 'MIC', camera: 'CAMERA' }[captureKind];
        document.body.classList.toggle('screen', captureKind === 'screen');
        $('audioInd').classList.toggle('hidden', captureKind !== 'audio');
        try { await (navigator.wakeLock && navigator.wakeLock.request('screen')); } catch {}
        // Orientation lock only makes sense for a phone camera viewfinder.
        if (captureKind === 'camera') { try { if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape'); } catch {} }
        $('join').classList.add('hidden');
        $('armed').classList.remove('hidden');
        document.body.classList.add('live');   // reveal the full-bleed viewfinder
        updateOrientation();
        initBattery();
        connectWS(name);
      } catch (e) {
        $('joinBtn').disabled = false;
        log('Capture error: ' + (e.message || e.name));
      }
    });
  </script>
</body>
</html>
